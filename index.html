<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Gallery</title>
<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 20px;
        background: #f4f4f4;
    }

    .scroll-container {
        display: flex;
        overflow-x: auto;
        gap: 10px;
        padding: 10px;
        background: white;
        border-radius: 8px;
        scroll-behavior: smooth;
        margin-bottom: 20px;
    }
    .scroll-container img {
        height: 150px;
        border-radius: 6px;
        flex-shrink: 0;
        transition: transform 0.3s;
        cursor: pointer;
    }
    .scroll-container img:hover { transform: scale(1.05); }

    .grid-container {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 12px;
    }
    .grid-container img {
        width: 100%;
        border-radius: 8px;
        object-fit: cover;
        height: 180px;
        transition: transform 0.3s;
        cursor: pointer;
    }
    .grid-container img:hover { transform: scale(1.03); }

    #status {
        color: #888;
        font-style: italic;
        margin-bottom: 10px;
    }
</style>
</head>
<body>
<h2>Image Gallery</h2>
<p id="status">Loading images...</p>

<h3>Horizontal Scroll</h3>
<div class="scroll-container" id="scrollStrip"></div>

<h3>Grid View</h3>
<div class="grid-container" id="imageGrid"></div>

<script>
    // ✏️ CHANGE THESE to match your GitHub info
    const GITHUB_USER = "your-username";
    const GITHUB_REPO = "your-repo-name";
    const FOLDER_PATH = "Images"; // folder inside your repo

    const API_URL = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${FOLDER_PATH}`;
    const RAW_BASE = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main/${FOLDER_PATH}/`;

    const scrollStrip = document.getElementById("scrollStrip");
    const imageGrid = document.getElementById("imageGrid");
    const status = document.getElementById("status");

    const imageExtensions = [".jpg", ".jpeg", ".png", ".gif", ".webp", ".svg"];

    fetch(API_URL)
        .then(res => res.json())
        .then(files => {
            const images = files.filter(file =>
                imageExtensions.some(ext => file.name.toLowerCase().endsWith(ext))
            );

            if (images.length === 0) {
                status.textContent = "No images found in the folder.";
                return;
            }

            status.textContent = `${images.length} image(s) loaded.`;

            images.forEach(file => {
                const src = RAW_BASE + file.name;

                const img1 = document.createElement("img");
                img1.src = src;
                img1.alt = file.name;
                scrollStrip.appendChild(img1);

                const img2 = document.createElement("img");
                img2.src = src;
                img2.alt = file.name;
                imageGrid.appendChild(img2);
            });
        })
        .catch(() => {
            status.textContent = "Failed to load images. Check your GitHub username, repo, and folder name.";
        });
</script>

</body>
</html>
